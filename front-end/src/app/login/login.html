<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>

<div class="main">


    <div
        class="container a-container"
        id="a-container"
        [class.is-txl]="!isSignIn"
    >

  <button class="back-btn" (click)="goBack()">
    <span class="material-icons">arrow_back</span>
</button>
        <form id="a-form" class="form" method="" action="">
            <h2 class="form_title title">Criar Conta</h2>

            <div class="form__icons">
                <img class="form__icon" src="data:image/svg+xml;base64,PD94bWwgdmVyc2lvbj0iMS4wIiA/Pjxzdmcg..." alt="">
                <img class="form__icon" src="data:image/svg+xml;base64,PD94bWwgdmVyc2lvbj0iMS4wIiA/Pjxzdmcg...">
                <img class="form__icon" src="data:image/svg+xml;base64,PD94bWwgdmVyc2lvbj0iMS4wIiA/Pjxzdmcg...">
            </div>

            <span class="form__span">ou use o email para registro</span>

            <input class="form__input" type="text" placeholder="Nome">
            <input class="form__input" type="text" placeholder="Email">
            <input class="form__input" type="password" placeholder="Senha">

            <button class="form__button button submit">CADASTRAR</button>
        </form>
    </div>

    <div
        class="container b-container"
        id="b-container"
        [class.is-txl]="!isSignIn"
        [class.is-z200]="!isSignIn"
    >
        <form id="b-form" class="form" method="" action="">
            <h2 class="form_title title">Entrar no Site</h2>

            <div class="form__icons">
                <img class="form__icon" src="data:image/svg+xml;base64,PD94bWwgdmVyc2lvbj0iMS4wIiA/Pjxzdmcg..." alt="">
                <img class="form__icon" src="data:image/svg+xml;base64,PD94bWwgdmVyc2lvbj0iMS4wIiA/Pjxzdmcg...">
                <img class="form__icon" src="data:image/svg+xml;base64,PD94bWwgdmVyc2lvbj0iMS4wIiA/Pjxzdmcg...">
            </div>

            <span class="form__span">ou use sua conta de email</span>

            <input class="form__input" type="text" placeholder="Email">
            <input class="form__input" type="password" placeholder="Senha">

            <a class="form__link">Esqueceu sua senha?</a>

            <button class="form__button button submit">ENTRAR</button>
        </form>
    </div>

    <div
        class="switch"
        id="switch-cnt"
        [class.is-txr]="!isSignIn"
    >
        <div
            class="switch__circle"
            [class.is-txr]="!isSignIn"
        ></div>

        <div
            class="switch__circle switch__circle--t"
            [class.is-txr]="!isSignIn"
        ></div>

        <div
            class="switch__container"
            id="switch-c1"
            [class.is-hidden]="!isSignIn"
        >

            <h2 class="switch__title title">Bem-vindo!</h2>
            <p class="switch__description description">
                Para continuar conectado, faça login com suas informações pessoais
            </p>
            <button
                class="switch__button button switch-btn"
                (click)="changeForm()"
            >
                ENTRAR
            </button>
        </div>

        <div
            class="switch__container"
            id="switch-c2"
            [class.is-hidden]="isSignIn"
        >
  <button class="back-btn" (click)="goBack()">
    <span class="material-icons">arrow_back</span>
</button>
            <h2 class="switch__title title">Olá, amigo!</h2>
            <p class="switch__description description">
                Digite seus dados pessoais e comece sua jornada conosco
            </p>
            <button
                class="switch__button button switch-btn"
                (click)="changeForm()"
            >
                CADASTRAR
            </button>
        </div>
    </div>

</div>

</body>
